<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Nexora Status – Estado del sistema</title>

  <!-- Security -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

  <!-- SEO / Social -->
  <meta name="description" content="Página oficial de estado de Nexora. Información en tiempo real sobre servicios, red e infraestructura." />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0b0f1a" />
  <meta property="og:title" content="Nexora Status – Estado del sistema" />
  <meta property="og:description" content="Información en tiempo real sobre servicios, red e infraestructura de Nexora." />
  <meta property="og:image" content="https://cdn.nexorabot.xyz/nexora/img/logo.svg" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />

  <!-- Favicon from CDN -->
  <link rel="icon" href="https://cdn.nexorabot.xyz/nexora/img/logo.svg" type="image/svg+xml" />

  <!-- Preconnect / DNS prefetch -->
  <link rel="preconnect" href="https://cdn.nexorabot.xyz" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />

  <!-- Preload critical assets from CDN -->
  <link rel="preload" as="image" href="https://cdn.nexorabot.xyz/nexora/img/blue-landscape.webp" fetchpriority="high" />
  <link rel="preload" as="image" href="https://cdn.nexorabot.xyz/nexora/img/logo.svg" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <!-- Font Awesome (integrity check for SRI) -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <link rel="stylesheet" href="main.css" />
</head>

<body>
  <main class="container">

    <!-- ══ VISTA PRINCIPAL (HOME) ══ -->
    <div id="view-home" class="spa-view">

      <!-- HEADER -->
      <header>
        <div class="brand">
          <div class="logo">
            <img
              src="https://cdn.nexorabot.xyz/nexora/img/logo.svg"
              alt="Nexora logo"
              width="36" height="36"
              loading="eager"
              decoding="async"
            />
          </div>
          <div class="title">
            <strong>Nexora – Estado del sistema</strong>
            <span>Información en tiempo real • Uptime y incidentes • Historial de 30 días</span>
          </div>
        </div>
      </header>

      <!-- ANUNCIOS -->
      <div id="announcements-bar" role="region" aria-label="Anuncios"></div>

      <!-- STATUS GENERAL -->
      <section class="hero" aria-label="Estado general del sistema">
        <div class="status-dot status-up" role="img" aria-label="Estado: operativo"></div>
        <div>
          <h2 id="site-status">Cargando estado...</h2>
          <p>Última verificación: <time id="last-checked" datetime="">–</time></p>
        </div>
        <div class="uptime" aria-label="Disponibilidad total">
          <div>Disponibilidad total</div>
          <strong id="uptime-percent" aria-live="polite">–</strong>
        </div>
      </section>

      <!-- INCIDENTES ACTIVOS -->
      <div id="incidents-section" role="region" aria-label="Incidentes activos"></div>

      <!-- VISTA RÁPIDA -->
      <section class="quick-view-section" aria-label="Vista rápida de servicios">
        <h3>Estado de servicios</h3>
        <div class="quick-view-grid" id="quick-view-grid"></div>
      </section>

      <!-- DETALLES COMPLETOS -->
      <section class="details-section" aria-label="Detalles por servicio">
        <h3>Detalles por servicio</h3>
        <div class="grid" id="services-grid"></div>
      </section>

      <!-- HISTORIAL DE INCIDENTES -->
      <div id="incidents-history" role="region" aria-label="Historial de incidentes"></div>

      <footer>
        © <span id="year"></span> Nexora – Status Monitor
      </footer>

    </div><!-- /view-home -->

    <!-- ══ VISTA DETALLE DE SERVICIO (SPA) ══ -->
    <div id="view-service" class="spa-view" hidden
         role="main" aria-label="Detalle del servicio">
      <!-- Renderizado dinámicamente por service-detail.js -->
    </div>

  </main>

  <!-- Módulos JS (orden de dependencias) -->
  <script src="js/appearance.js"></script>
  <script src="js/utils.js" defer></script>
  <script src="js/icons.js" defer></script>
  <script src="js/announcements.js" defer></script>
  <script src="js/incidents.js" defer></script>
  <script src="js/history.js" defer></script>
  <script src="js/sparkline.js" defer></script>
  <script src="js/cards.js" defer></script>
  <script src="js/servicedetail.js" defer></script>
  <script src="js/main.js" defer></script>
</body>

</html>
